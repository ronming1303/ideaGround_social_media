services:
  mongodb:
    image: mongo:7.0
    container_name: ideaground-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ideaground
    volumes:
      - mongodb_data:/data/db
      - ./seed-data:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:27017:27017"
    networks:
      - ideaground-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ..
      dockerfile: docker-local/Dockerfile.backend
    container_name: ideaground-backend
    restart: unless-stopped
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=ideaground
      - LOCAL_AUTH_ENABLED=false
      - GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID_REMOVED
      - GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET_REMOVED
      - GOOGLE_REDIRECT_URI=https://ideaground.net/api/auth/google/callback
      - FRONTEND_URL=https://ideaground.net
      - CORS_ORIGINS=https://ideaground.net,http://localhost:3000,http://localhost:8080
      - STRIPE_SECRET_KEY=STRIPE_SECRET_KEY_REMOVED
      - STRIPE_PUBLISHABLE_KEY=STRIPE_PUBLISHABLE_KEY_REMOVED
    ports:
      - "127.0.0.1:8001:8001"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ideaground-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/auth/mode"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ..
      dockerfile: docker-local/Dockerfile.frontend
      args:
        REACT_APP_BACKEND_URL: ""
        REACT_APP_LOCAL_AUTH: "false"
        REACT_APP_STRIPE_PUBLISHABLE_KEY: "STRIPE_PUBLISHABLE_KEY_REMOVED"
    container_name: ideaground-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ideaground-network

volumes:
  mongodb_data:
    name: ideaground_mongodb_data

networks:
  ideaground-network:
    name: ideaground-network
    driver: bridge
