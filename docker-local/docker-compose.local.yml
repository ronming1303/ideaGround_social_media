services:
  mongodb:
    image: mongo:7.0
    container_name: ideaground-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ideaground
    volumes:
      - mongodb_data:/data/db
      - ./seed-data:/docker-entrypoint-initdb.d:ro
    ports:
      - "27017:27017"
    networks:
      - ideaground-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ..
      dockerfile: docker-local/Dockerfile.backend
    container_name: ideaground-backend
    restart: unless-stopped
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=ideaground
      - LOCAL_AUTH_ENABLED=true
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000,http://127.0.0.1:8080
    ports:
      - "8001:8001"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ideaground-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ..
      dockerfile: docker-local/Dockerfile.frontend
      args:
        REACT_APP_BACKEND_URL: http://localhost:8080
        REACT_APP_LOCAL_AUTH: "true"
    container_name: ideaground-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ideaground-network

volumes:
  mongodb_data:
    name: ideaground_mongodb_data

networks:
  ideaground-network:
    name: ideaground-network
    driver: bridge
