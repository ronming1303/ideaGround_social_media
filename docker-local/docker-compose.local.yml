services:
  mongodb-local:
    image: mongo:7.0
    container_name: ideaground-mongodb-local
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ideaground
      MONGO_SEED_DATA: ${MONGO_SEED_DATA:-false}
    volumes:
      - mongodb_local_data:/data/db
      - ./seed-data:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:27019:27017"
    networks:
      - ideaground-local-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend-local:
    build:
      context: ..
      dockerfile: docker-local/Dockerfile.backend
    container_name: ideaground-backend-local
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      - MONGO_URL=mongodb://mongodb-local:27017
      - DB_NAME=ideaground
      - LOCAL_AUTH_ENABLED=true
      - GOOGLE_REDIRECT_URI=http://localhost:8080/api/auth/google/callback
      - FRONTEND_URL=http://localhost:8080
      - CORS_ORIGINS=http://localhost:8080
      - R2_KEY_PREFIX=local
    volumes:
      - video_local_data:/data/videos
    ports:
      - "127.0.0.1:8003:8001"
    depends_on:
      mongodb-local:
        condition: service_healthy
    networks:
      - ideaground-local-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/auth/mode"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend-local:
    build:
      context: ..
      dockerfile: docker-local/Dockerfile.frontend
      args:
        REACT_APP_BACKEND_URL: ""
        REACT_APP_LOCAL_AUTH: "true"
        REACT_APP_STRIPE_PUBLISHABLE_KEY: "pk_test_51T9BgeIq7nviYilsVk7AReTms9mqS1tly1pwb8xJcEHYeTtunUEDyFsSPo0cJabMaFnBDIeQR10MFQZfWegUuJJi00X4ADzHs4"
        REACT_APP_ENV: "development"
    container_name: ideaground-frontend-local
    restart: unless-stopped
    volumes:
      - ./nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      backend-local:
        condition: service_healthy
    networks:
      - ideaground-local-network

volumes:
  mongodb_local_data:
    name: ideaground_mongodb_local_data
  video_local_data:
    name: ideaground_video_local_data

networks:
  ideaground-local-network:
    name: ideaground-local-network
    driver: bridge
